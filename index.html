<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#D6ECFF"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Yong Bros Tokyo"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <title>Yong Bros — Tokyo, we're coming.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Poppins:wght@700;800&family=Syne:wght@500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue-50: #F0F7FF;
      --blue-100: #D6ECFF;
      --blue-200: #B5D4F4;
      --blue-400: #378ADD;
      --blue-600: #185FA5;
      --blue-800: #0C447C;
      --blue-900: #042C53;
      --white: #ffffff;
      --gray-50: #F8FAFB;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: #EAEEF3;
      min-height: 100vh;
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #EAEEF3;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--blue-400);
      padding: 16px 20px 16px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .topbar.has-bg {
      background: transparent;
    }
    .topbar .greeting,
    .topbar .trip-name,
    .topbar .date-lbl,
    .topbar .date-val,
    .topbar .date-badge { color: rgba(255,255,255,0.95); }
    .topbar .date-banner { background: rgba(255,255,255,0.18); border: none; }
    .topbar .day-pill.active { background: rgba(255,255,255,0.3); }
    .topbar .offline-pill { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); }
    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .greeting {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.2px;
      margin-bottom: 3px;
    }
    .trip-name {
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .editable-text {
      background: transparent;
      border: none;
      outline: none;
      font: inherit;
      color: inherit;
      letter-spacing: inherit;
      width: 100%;
      cursor: text;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .editable-text:focus { border-bottom-color: rgba(255,255,255,0.5); }
    .offline-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #EAF3DE;
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      color: #3B6D11;
      font-weight: 500;
    }
    .offline-dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; }

    .date-banner {
      background: var(--blue-200);
      border-radius: var(--radius-md);
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .date-lbl { font-size: 11px; color: var(--blue-600); margin-bottom: 2px; }
    .date-val { font-family: var(--font-display); font-size: 14px; font-weight: 500; color: var(--blue-900); }
    .date-badge {
      background: var(--blue-400);
      color: var(--blue-50);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }

    .day-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .day-scroll::-webkit-scrollbar { display: none; }
    .day-pill {
      flex-shrink: 0;
      width: 46px;
      text-align: center;
      padding: 7px 4px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s;
    }
    .day-pill .dn { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--blue-600); }
    .day-pill .dl { font-size: 10px; color: var(--blue-400); margin-top: 1px; }
    .day-pill.active { background: rgba(255,255,255,0.3); }
    .day-pill .day-num-input,
    .day-pill.active .day-num-input { color: #fff !important; border-bottom-color: rgba(255,255,255,0.4); }
    .day-pill .day-lbl-input,
    .day-pill.active .day-lbl-input { color: #fff !important; }

    /* ── TABS ── */
    .tabs {
      background: var(--white);
      display: flex;
      border-bottom: none;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--blue-400);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .tab.active { color: var(--blue-800); border-bottom-color: var(--blue-400); }

    /* ── BODY ── */
    .body {
      flex: 1;
      background: #EAEEF3;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sec-lbl {
      font-size: 12px;
      color: var(--blue-800);
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    /* ── PLACE CARDS ── */
    .it-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .it-row { display: flex; align-items: stretch; }
    .it-time-col {
      width: 60px;
      flex-shrink: 0;
      text-align: center;
      padding: 16px 4px;
      background: #F4F7FB;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .it-time { font-family: var(--font-display); font-size: 12px; font-weight: 500; color: var(--blue-800); }
    .it-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue-400); margin-top: 6px; }
    .it-body { flex: 1; padding: 12px 12px 12px 10px; min-width: 0; }

    .it-photo {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 8px;
      display: block;
    }
    .it-photo-placeholder {
      width: 100%;
      height: 52px;
      background: #F4F7FB;
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--blue-400);
      cursor: pointer;
      border: 1px dashed #C8D8E8;
      transition: background 0.15s;
    }
    .it-photo-placeholder:active { background: var(--blue-200); }

    .it-name { font-family: var(--font-display); font-size: 14px; font-weight: 500; color: var(--blue-900); margin-bottom: 3px; }
    .it-desc { font-size: 12px; color: var(--blue-600); line-height: 1.5; margin-bottom: 5px; }
    .it-note {
      font-size: 12px;
      color: #5a6a7a;
      line-height: 1.55;
      background: #F4F7FB;
      border-radius: 8px;
      padding: 7px 9px;
      margin-bottom: 7px;
      white-space: pre-wrap;
      border-left: 2px solid var(--blue-200);
    }
    .it-foot { display: flex; justify-content: space-between; align-items: center; }
    .it-actions { display: flex; gap: 7px; }

    .tag { font-size: 10px; padding: 3px 9px; border-radius: 8px; font-weight: 500; }
    .tag-food { background: #FBEAF0; color: #993356; }
    .tag-sight { background: #EAF3DE; color: #3B6D11; }
    .tag-shop { background: #EEEDFE; color: #3C3489; }
    .tag-transit { background: #EBF4FF; color: var(--blue-600); }
    .tag-stay { background: #FAEEDA; color: #854F0B; }

    .ic-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #F4F7FB;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .ic-btn:active { background: var(--blue-200); }
    .ic-btn.edit-btn { background: #EBF4FF; }

    .add-btn {
      width: 100%;
      padding: 14px;
      background: var(--white);
      border: 1.5px dashed #C8D8E8;
      border-radius: var(--radius-lg);
      font-size: 13px;
      color: var(--blue-400);
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
      font-family: var(--font-body);
      transition: border-color 0.15s, color 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .add-btn:active { border-color: var(--blue-400); color: var(--blue-800); }

    /* ── BUDGET ── */
    .budget-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 16px;
      margin-bottom: 12px;
    }
    .bud-amounts { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .bud-spent { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--blue-900); }
    .bud-total { font-size: 13px; color: var(--blue-400); }
    .bud-bar { height: 7px; background: #E0E7EF; border-radius: 4px; margin-bottom: 4px; overflow: hidden; }
    .bud-fill { height: 100%; border-radius: 4px; background: var(--blue-400); }
    .bud-pct { font-size: 11px; color: var(--blue-600); text-align: right; }
    .bud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
    .bud-item { background: #F4F7FB; border-radius: var(--radius-sm); padding: 11px; }
    .bud-cat { font-size: 11px; color: var(--blue-600); margin-bottom: 4px; }
    .bud-amt { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--blue-900); }

    .daily-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 0.5px solid #F0F3F7;
      font-size: 13px;
    }
    .daily-row:last-child { border: none; }
    .daily-day { color: var(--blue-600); }
    .daily-amt { font-family: var(--font-display); font-weight: 500; color: var(--blue-900); }

    /* ── INFO ── */
    .info-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 14px;
      margin-bottom: 12px;
    }
    .info-title { font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--blue-800); margin-bottom: 10px; }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 0.5px solid #F0F3F7; }
    .info-row:last-child { border: none; }
    .info-l { color: var(--blue-800); }
    .info-r { font-weight: 500; color: var(--blue-900); }
    .info-row input { border-bottom: none !important; }
    .sos-row input { border-bottom: none !important; }
    .rate-box { background: #F4F7FB; border-radius: 10px; padding: 12px; text-align: center; margin-top: 10px; }
    .rate-big { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--blue-800); }
    .rate-small { font-size: 11px; color: var(--blue-400); margin-top: 3px; }
    .sos-card { background: #FCEBEB; border-radius: var(--radius-lg); padding: 14px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 12px; }
    .sos-title { font-family: var(--font-display); font-size: 13px; font-weight: 500; color: #791F1F; margin-bottom: 10px; }
    .sos-row { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 0.5px solid rgba(240,149,149,0.3); }
    .sos-row:last-child { border: none; }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--white);
      display: flex;
      border-top: none;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
      padding: 8px 0 20px;
      flex-shrink: 0;
    }
    .nb-btn { flex: 1; text-align: center; cursor: pointer; padding: 4px 0; }
    .nb-icon { font-size: 20px; display: block; margin-bottom: 3px; }
    .nb-lbl { font-size: 10px; color: var(--blue-400); }
    .nb-btn.active .nb-lbl { color: var(--blue-800); font-weight: 500; }
    .nb-active-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue-400); margin: 3px auto 0; opacity: 0; }
    .nb-btn.active .nb-active-dot { opacity: 1; }

    /* ── MODAL ── */
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(4,44,83,0.5);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 50;
      padding: 60px 16px 16px;
      overflow-y: auto;
    }
    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 20px;
      width: 100%;
      max-width: 360px;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--blue-900); margin-bottom: 16px; }
    .field-lbl { font-size: 11px; color: var(--blue-600); margin-bottom: 5px; margin-top: 12px; font-weight: 500; }
    .field-lbl:first-of-type { margin-top: 0; }
    .minput {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--blue-200);
      background: var(--blue-50);
      font-size: 14px;
      color: var(--blue-900);
      font-family: var(--font-body);
      outline: none;
    }
    .minput:focus { border-color: var(--blue-400); background: var(--white); }
    .mtextarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--blue-200);
      background: var(--blue-50);
      font-size: 14px;
      color: var(--blue-900);
      font-family: var(--font-body);
      resize: vertical;
      min-height: 80px;
      line-height: 1.55;
      outline: none;
    }
    .mtextarea:focus { border-color: var(--blue-400); background: var(--white); }
    .mselect {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--blue-200);
      background: var(--blue-50);
      font-size: 14px;
      color: var(--blue-900);
      font-family: var(--font-body);
      outline: none;
    }
    .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
    .mbtn {
      flex: 1; padding: 12px;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      border: none;
      font-family: var(--font-body);
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .mbtn:active { opacity: 0.8; }
    .mbtn-cancel { background: #EBF4FF; color: var(--blue-600); }
    .mbtn-save { background: var(--blue-400); color: var(--white); }
    .mbtn-del { background: #FCEBEB; color: #A32D2D; }

    /* ── NIGHT MODE ── */
    .app.night { background: #0B1628; }
    .app.night html, .app.night body { background: #0B1628; }
    .app.night .body { background: #0B1628; }
    .app.night .tabs { background: #142236; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .app.night .tab { color: #6B8AAF; }
    .app.night .tab.active { color: #E8F1FC; border-bottom-color: #5FA8FF; }
    .app.night .navbar { background: #142236; box-shadow: 0 -2px 12px rgba(0,0,0,0.4); }
    .app.night .nb-lbl { color: #6B8AAF; }
    .app.night .nb-btn.active .nb-lbl { color: #E8F1FC; }
    .app.night .nb-active-dot { background: #5FA8FF; }
    .app.night .sec-lbl { color: #9FB8D9; }
    .app.night .it-card { background: #1A2A44; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .app.night .it-time-col { background: #223555; }
    .app.night .it-time { color: #E8F1FC; }
    .app.night .it-dot { background: #5FA8FF; }
    .app.night .it-name { color: #F2F6FC !important; }
    .app.night .it-desc { color: #B8CCE8 !important; }
    .app.night .it-note { background: rgba(255,255,255,0.06); color: #C5D6EE; border-left-color: rgba(95,168,255,0.35); }
    .app.night .it-photo-placeholder { background: rgba(255,255,255,0.06); color: #C5D6EE; border-color: rgba(255,255,255,0.25); }
    .app.night .it-photo-placeholder:active { background: rgba(255,255,255,0.12); }
    .app.night .info-card { background: #1A2A44; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .app.night .info-title { color: #E8F1FC; }
    .app.night .info-row { border-bottom-color: rgba(255,255,255,0.08); }
    .app.night .info-l { color: #9FB8D9; }
    .app.night .info-r, .app.night .info-card input { color: #F2F6FC !important; }
    .app.night .info-card input { border-bottom-color: rgba(95,168,255,0.3) !important; }
    .app.night .rate-box { background: #223555; }
    .app.night .rate-big { color: #E8F1FC; }
    .app.night .rate-big input { color: #E8F1FC !important; border-bottom-color: #5FA8FF !important; }
    .app.night .rate-small { color: #9FB8D9; }
    .app.night .sos-card { background: #3A1F2A; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .app.night .sos-title { color: #F4B3B3; }
    .app.night .sos-row { border-bottom-color: rgba(244,179,179,0.15); }
    .app.night .sos-row input { color: #F4B3B3 !important; }
    .app.night .bud-grid .bud-item { background: #223555; }
    .app.night .bud-cat, .app.night .bud-amt, .app.night .bud-spent, .app.night .bud-total, .app.night .daily-amt, .app.night .daily-lbl { color: #E8F1FC !important; }
    .app.night .bud-item input { color: #E8F1FC !important; }
    .app.night .budget-card { background: #1A2A44; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .app.night .bud-spent { color: #F2F6FC !important; }
    .app.night .bud-total { color: #9FB8D9 !important; }
    .app.night .bud-total input { color: #9FB8D9 !important; border-bottom-color: rgba(95,168,255,0.3) !important; }
    .app.night .bud-bar { background: #0B1628; }
    .app.night .bud-fill { background: #5FA8FF; }
    .app.night .bud-pct { color: #9FB8D9; }
    .app.night .bud-cat { color: #9FC5FF !important; }
    .app.night .daily-row { border-bottom-color: rgba(255,255,255,0.08); }
    .app.night .daily-day { color: #9FC5FF !important; }
    .app.night .daily-amt input { color: #E8F1FC !important; border-bottom-color: rgba(95,168,255,0.3) !important; }
    .app.night .day-pill { color: #9FB8D9; }
    .app.night .day-pill.active { background: rgba(95,168,255,0.25); color: #F2F6FC; }
    .app.night .day-pill .dn, .app.night .day-pill .dl { color: inherit !important; }
    .app.night .date-banner { background: rgba(255,255,255,0.08); }
    .app.night .tag-food { background: rgba(239,159,39,0.2); color: #F5C787; }
    .app.night .tag-sight { background: rgba(95,168,255,0.2); color: #9FC5FF; }
    .app.night .tag-shop { background: rgba(212,83,126,0.2); color: #ED93B1; }
    .app.night .tag-transit { background: rgba(159,225,203,0.15); color: #9FE1CB; }
    .app.night .tag-stay { background: rgba(175,169,236,0.2); color: #CECBF6; }
    .app.night .ic-btn { background: #223555; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .app.night .ic-btn.edit-btn { background: #223555; }
    .app.night .ic-btn:active { background: #334A6E; }
    .app.night .add-btn { background: #1A2A44; color: #9FC5FF; border-color: rgba(95,168,255,0.35); }
    .app.night .day-bg-overlay { background: rgba(0,0,0,0.45); }

// Firebase save/load placeholders (replaced by module script)
window._fbSave = function(){};

function save(){ window._fbSave(); }
function tagCls(t){return TAGCLS[t]||'tag-sight';}
function tagName(t){return TYPES[t]||t;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleTopbarEdit(){
  const topbar=document.querySelector('.topbar');
  const btn=document.getElementById('topbarEditBtn');
  const bgLabel=document.querySelector('.topbar-bg-label');
  const inputs=[document.getElementById('editGreeting'),document.getElementById('editTripName')];
  const dayInputs=document.querySelectorAll('.day-num-input,.day-lbl-input');
  const isEdit=topbar.classList.toggle('edit-mode');
  if(isEdit){
    btn.textContent='✅';
    bgLabel.style.display='inline-flex';
    inputs.forEach(inp=>{inp.removeAttribute('readonly');});

    dayInputs.forEach(inp=>{inp.setAttribute('readonly','');});

function applyBg(day){
  const container=document.getElementById('dayBgContainer');
  const img=document.getElementById('dayBgImg');
  const topbar=document.querySelector('.topbar');
  if(window.bgData[day]){img.src=window.bgData[day];container.style.display='block';topbar.classList.add('has-bg');}
  else{container.style.display='none';img.src='';topbar.classList.remove('has-bg');}
}

function handleBgUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.7);
      window.bgData[currentDay]=compressed;
      window._bgJustUploaded=true;
      setTimeout(()=>{window._bgJustUploaded=false;},3000);
      applyBg(currentDay);
      window._fbSave();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);e.target.value='';
}

function handleModalPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    document.getElementById('m-photo').value=ev.target.result;
    const preview=document.getElementById('m-photo-preview');
    if(preview.tagName==='IMG'){preview.src=ev.target.result;}
    else{const img=document.createElement('img');img.id='m-photo-preview';img.src=ev.target.result;img.style.cssText='width:60px;height:44px;object-fit:cover;border-radius:8px;border:0.5px solid var(--blue-200)';preview.replaceWith(img);}
  };
  reader.readAsDataURL(file);e.target.value='';
}

function handlePlacePhoto(e,idx){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){data[currentDay][idx].photo=ev.target.result;window._fbSave();renderItinerary();};
  reader.readAsDataURL(file);e.target.value='';
}

function renderItinerary(){
  const places=data[currentDay]||[];

      ?`<div style="position:relative"><img class="it-photo" src="${esc(p.photo)}" onerror="this.style.display='none'" loading="lazy"/><label style="position:absolute;bottom:6px;right:6px;background:rgba(255,255,255,0.82);border-radius:12px;padding:3px 8px;font-size:10px;color:var(--blue-600);cursor:pointer" for="placePhoto_${i}">🔄 換圖<input type="file" id="placePhoto_${i}" accept="image/*" style="display:none" onchange="handlePlacePhoto(event,${i})"/></label></div>`
      :`<label class="it-photo-placeholder" for="placePhoto_${i}" style="cursor:pointer">📷 上傳照片<input type="file" id="placePhoto_${i}" accept="image/*" style="display:none" onchange="handlePlacePhoto(event,${i})"/></label>`;
    h+=`<div class="it-card"><div class="it-row"><div class="it-time-col"><div class="it-time">${esc(p.time)}</div><div class="it-dot"></div></div><div class="it-body">${photoHTML}<div class="it-name">${esc(p.name)}</div><div class="it-desc">${esc(p.desc)}</div>${noteHTML}<div class="it-foot"><span class="tag ${tagCls(p.type)}">${tagName(p.type)}</span><div class="it-actions"><span class="ic-btn edit-btn" onclick="openEdit(${i})">✏️</span><a class="ic-btn" href="${esc(p.map||'#')}" target="_blank" rel="noopener">🧭</a></div></div></div></div></div>`;

function calcBudgetSpent(){return budgetData.cats.reduce((s,c)=>s+c.amt,0);}
function renderBudget(){
  const spent=calcBudgetSpent();
  const total=budgetData.total;
  const pct=Math.round(spent/total*100);
  let h=`<div class="sec-lbl">總預算</div><div class="budget-card">`;
  h+=`<div class="bud-amounts">`;
  h+=`<span class="bud-spent">¥${spent.toLocaleString()}</span>`;
  h+=`<span class="bud-total">/ <input type="number" value="${total}" onchange="budgetData.total=parseInt(this.value)||0;renderBudget();" style="width:80px;border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-body);font-size:13px;color:var(--blue-400);text-align:right;outline:none;" /></span>`;
  h+=`</div>`;
  h+=`<div class="bud-bar"><div class="bud-fill" style="width:${Math.min(pct,100)}%"></div></div>`;
  h+=`<div class="bud-pct">${pct}% 已使用</div>`;
  h+=`<div class="bud-grid">${budgetData.cats.map((r,i)=>`<div class="bud-item"><div class="bud-cat">${r.icon} ${r.name}</div><div class="bud-amt">¥<input type="number" value="${r.amt}" onchange="budgetData.cats[${i}].amt=parseInt(this.value)||0;renderBudget();" style="width:70px;border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-display);font-size:15px;color:var(--blue-900);outline:none;" /></div></div>`).join('')}</div>`;
  h+=`</div>`;
  h+=`<div class="sec-lbl">每日花費</div><div class="budget-card">`;
  h+=budgetData.daily.map((r,i)=>`<div class="daily-row"><span class="daily-day">${r.day} <span style="color:#B5D4F4">·</span> ${r.label}</span><span class="daily-amt">¥<input type="number" value="${r.amt}" onchange="budgetData.daily[${i}].amt=parseInt(this.value)||0;" style="width:65px;border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-display);font-size:13px;font-weight:500;color:var(--blue-900);outline:none;" /></span></div>`).join('');
  h+=`</div>`;
  document.getElementById('bodyContent').innerHTML=h;
}

function renderInfo(){
  if(infoData.tripRows&&infoData.tripRows.some(r=>['住宿','Check-in','Check-out'].includes(r.label))){
    if(!infoData.hotels||!Array.isArray(infoData.hotels)){
      const oldHotel=infoData.tripRows.find(r=>r.label==='住宿');
      const oldCheckIn=infoData.tripRows.find(r=>r.label==='Check-in');
      const oldCheckOut=infoData.tripRows.find(r=>r.label==='Check-out');
      infoData.hotels=[{
        name:oldHotel?oldHotel.val:'新宿 Gracery Hotel',
        range:'2025/06/10 – 06/16',
        checkIn:oldCheckIn?oldCheckIn.val:'15:00',
        checkOut:oldCheckOut?oldCheckOut.val:'11:00'
      }];
    }
    infoData.tripRows=infoData.tripRows.filter(r=>!['住宿','Check-in','Check-out'].includes(r.label));
    save();
  }
  if(infoData.tripRows){
    const desiredOrder=['出發日','去程航班','回程日','回程航班'];
    const current=infoData.tripRows.map(r=>r.label).join(',');
    const sorted=[...infoData.tripRows].sort((a,b)=>{
      const ia=desiredOrder.indexOf(a.label);
      const ib=desiredOrder.indexOf(b.label);
      return (ia<0?99:ia)-(ib<0?99:ib);
    });
    const after=sorted.map(r=>r.label).join(',');
    if(current!==after){infoData.tripRows=sorted;save();}
  }
  const inStyle=`border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--blue-900);outline:none;text-align:right;width:160px;`;
  let h=`<div class="info-card"><div class="info-title">旅程資訊</div>`;
  h+=infoData.tripRows.map((r,i)=>`<div class="info-row"><span class="info-l">${r.label}</span><input style="${inStyle}" value="${r.val}" onchange="infoData.tripRows[${i}].val=this.value;" /></div>`).join('');
  h+=`</div>`;
  h+=`<div class="info-card"><div class="info-title">匯率換算</div><div class="rate-box">`;
  h+=`<div class="rate-big">1 TWD = <input type="number" step="0.01" value="${infoData.rate}" onchange="infoData.rate=parseFloat(this.value)||0;renderInfo();" style="width:60px;border:none;border-bottom:2px solid var(--blue-400);background:transparent;font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--blue-800);outline:none;text-align:center;" /> JPY</div>`;
  h+=`<div class="rate-small">¥10,000 ≈ NT$${Math.round(10000/infoData.rate).toLocaleString()}</div>`;
  h+=`</div>`;
  h+=`<div class="rate-box" style="margin-top:10px">`;
  h+=`<div class="rate-big">1 MYR = <input type="number" step="0.01" value="${infoData.rateMyr}" onchange="infoData.rateMyr=parseFloat(this.value)||0;renderInfo();" style="width:60px;border:none;border-bottom:2px solid var(--blue-400);background:transparent;font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--blue-800);outline:none;text-align:center;" /> JPY</div>`;
  h+=`<div class="rate-small">¥10,000 ≈ RM${(10000/infoData.rateMyr).toFixed(2)}</div>`;
  h+=`</div></div>`;
  h+=`<div class="sos-card"><div class="sos-title">緊急聯絡</div>`;
  h+=infoData.sos.map((r,i)=>`<div class="sos-row"><input style="border:none;border-bottom:1px solid rgba(240,149,149,0.5);background:transparent;font-size:13px;color:#791F1F;outline:none;width:90px;" value="${r.label}" onchange="infoData.sos[${i}].label=this.value;" /><input style="border:none;border-bottom:1px solid rgba(240,149,149,0.5);background:transparent;font-size:13px;font-weight:500;color:#A32D2D;outline:none;text-align:right;width:140px;" value="${r.val}" onchange="infoData.sos[${i}].val=this.value;" /></div>`).join('');
  h+=`</div>`;
  h+=`<button class="night-toggle" onclick="toggleNightMode()"><span style="font-size:16px">${infoData.nightMode?'☀️':'🌙'}</span><span>${infoData.nightMode?'日間模式':'夜間模式'}</span></button>`;
  h+=`<div class="info-card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><span style="width:8px;height:8px;border-radius:50%;background:#639922;display:inline-block;flex-shrink:0"></span><span style="font-family:var(--font-display);font-size:13px;font-weight:500;color:#3B6D11">Firebase 雲端同步已啟用</span></div><div style="font-size:12px;color:var(--blue-600);line-height:1.5">照片與行程即時同步，兩支手機都看得到</div></div>`;
  document.getElementById('bodyContent').innerHTML=h;
}

function renderHotel(){
  if(!infoData.hotels||!Array.isArray(infoData.hotels)){
    infoData.hotels=[{name:'新宿 Gracery Hotel',range:'2025/06/10 – 06/16',checkIn:'15:00',checkOut:'11:00'}];
    if(infoData.tripRows){
      const oldHotel=infoData.tripRows.find(r=>r.label==='住宿');
      const oldCheckIn=infoData.tripRows.find(r=>r.label==='Check-in');
      const oldCheckOut=infoData.tripRows.find(r=>r.label==='Check-out');
      if(oldHotel)infoData.hotels[0].name=oldHotel.val;
      if(oldCheckIn)infoData.hotels[0].checkIn=oldCheckIn.val;
      if(oldCheckOut)infoData.hotels[0].checkOut=oldCheckOut.val;
      infoData.tripRows=infoData.tripRows.filter(r=>!['住宿','Check-in','Check-out'].includes(r.label));
    }
    save();
  }
  const inStyle=`border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--blue-900);outline:none;text-align:right;width:170px;`;
  const nameStyle=`border:none;border-bottom:1.5px solid var(--blue-200);background:transparent;font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--blue-900);outline:none;width:100%;padding:4px 0;`;
  let h='';
  infoData.hotels.forEach((ht,i)=>{
    h+=`<div class="info-card" style="position:relative">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="info-title" style="margin:0">住宿${infoData.hotels.length>1?' '+(i+1):''}</div><button onclick="deleteHotel(${i})" style="border:none;background:transparent;color:#A32D2D;font-size:12px;cursor:pointer;padding:2px 6px">刪除</button></div>`;
    h+=`<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--blue-600);margin-bottom:3px">名稱</div><input style="${nameStyle}" value="${ht.name}" onchange="infoData.hotels[${i}].name=this.value;save();" placeholder="住宿名稱" /></div>`;
    h+=`<div class="info-row"><span class="info-l">住宿區間</span><input style="${inStyle}" value="${ht.range}" onchange="infoData.hotels[${i}].range=this.value;save();" placeholder="2025/06/10 – 06/16" /></div>`;
    h+=`<div class="info-row"><span class="info-l">📅 入住 · Check-in</span><input style="${inStyle}" value="${ht.checkIn}" onchange="infoData.hotels[${i}].checkIn=this.value;save();" placeholder="15:00" /></div>`;
    h+=`<div class="info-row"><span class="info-l">📅 退房 · Check-out</span><input style="${inStyle}" value="${ht.checkOut}" onchange="infoData.hotels[${i}].checkOut=this.value;save();" placeholder="11:00" /></div>`;
    h+=`</div>`;
  });
  h+=`<button onclick="addHotel()" style="width:100%;padding:14px;margin-top:4px;background:#EBF4FF;border:1px dashed var(--blue-400);border-radius:var(--radius-lg);font-family:var(--font-display);font-size:14px;font-weight:500;color:var(--blue-600);cursor:pointer">＋ 新增住宿</button>`;
  document.getElementById('bodyContent').innerHTML=h;
}

function addHotel(){
  infoData.hotels.push({name:'',range:'',checkIn:'',checkOut:''});
  save();renderHotel();
}

function deleteHotel(i){
  if(!confirm('確定要刪除這間住宿嗎？'))return;
  infoData.hotels.splice(i,1);
  if(infoData.hotels.length===0)infoData.hotels.push({name:'',range:'',checkIn:'',checkOut:''});
  save();renderHotel();
}

function applyNightMode(){
  const app=document.getElementById('app');
  if(!app)return;
  if(infoData.nightMode)app.classList.add('night');
  else app.classList.remove('night');
}

function toggleNightMode(){
  infoData.nightMode=!infoData.nightMode;
  applyNightMode();
  save();
  renderInfo();
}

function openEdit(i){editIdx=i;isNew=false;const p=data[currentDay][i];showModal(p.time,p.name,p.desc,p.note||'',p.type,p.map,p.photo,false);}
function openNew(){editIdx=null;isNew=true;showModal('','','','','food','','',true);}

function showModal(time,name,desc,note,type,map,photo,isNewMode){
  const app=document.getElementById('app');
  const old=app.querySelector('.overlay');if(old)old.remove();
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-title">${isNewMode?'＋ 新增地點':'✏️ 編輯地點'}</div><div class="field-lbl">時間</div><input class="minput" id="m-time" type="time" value="${esc(time)}"/><div class="field-lbl">地點名稱</div><input class="minput" id="m-name" value="${esc(name)}" placeholder="地點名稱"/><div class="field-lbl">簡短描述</div><input class="minput" id="m-desc" value="${esc(desc)}" placeholder="一行簡介"/><div class="field-lbl">備注（可多行）</div><textarea class="mtextarea" id="m-note" placeholder="例如：要排隊、記得帶現金、推薦必點 xx...">${esc(note)}</textarea><div class="field-lbl">類別</div><select class="mselect" id="m-type">${Object.entries(TYPES).map(([k,v])=>`<option value="${k}"${k===type?' selected':''}>${v}</option>`).join('')}</select><div class="field-lbl">Google Maps 連結</div><input class="minput" id="m-map" value="${esc(map)}" placeholder="貼入 Google Maps 網址"/><div class="field-lbl">照片</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">${photo?`<img id="m-photo-preview" src="${esc(photo)}" style="width:60px;height:44px;object-fit:cover;border-radius:8px;border:0.5px solid var(--blue-200)"/>`:`<div id="m-photo-preview" style="width:60px;height:44px;background:#EBF4FF;border-radius:8px;border:0.5px solid var(--blue-200);display:flex;align-items:center;justify-content:center;font-size:18px">🏙</div>`}<label style="flex:1;padding:10px;background:#EBF4FF;border-radius:var(--radius-sm);border:0.5px dashed var(--blue-400);text-align:center;font-size:13px;color:var(--blue-600);cursor:pointer" for="m-photo-file">📷 ${photo?'換一張照片':'從相簿上傳'}<input type="file" id="m-photo-file" accept="image/*" style="display:none" onchange="handleModalPhoto(event)"/></label></div><input type="hidden" id="m-photo" value="${esc(photo)}"/><div class="modal-btns">${!isNewMode?`<button class="mbtn mbtn-del" onclick="deletePlace()">刪除</button>`:''}<button class="mbtn mbtn-cancel" onclick="closeModal()">取消</button><button class="mbtn mbtn-save" onclick="savePlace()">儲存</button></div></div>`;
  app.appendChild(ov);
}

function closeModal(){const ov=document.getElementById('app').querySelector('.overlay');if(ov)ov.remove();}

function savePlace(){
  const time=document.getElementById('m-time').value.trim();
  const name=document.getElementById('m-name').value.trim();
  const desc=document.getElementById('m-desc').value.trim();
  const note=document.getElementById('m-note').value.trim();
  const type=document.getElementById('m-type').value;
  const map=document.getElementById('m-map').value.trim();
  const photo=document.getElementById('m-photo').value;
  if(!name){alert('請輸入地點名稱');return;}
  if(isNew){data[currentDay].push({id:nextId++,time,name,desc,note,type,map,photo});}
  else{data[currentDay][editIdx]={...data[currentDay][editIdx],time,name,desc,note,type,map,photo};}
  data[currentDay].sort((a,b)=>a.time.localeCompare(b.time));
  window._fbSave();closeModal();renderItinerary();
}

function deletePlace(){
  if(!confirm('確定要刪除「'+data[currentDay][editIdx].name+'」嗎？'))return;
  data[currentDay].splice(editIdx,1);
  window._fbSave();closeModal();renderItinerary();
}

function switchTab(id,tabEl,nbIdx){
  currentTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb-btn').forEach(b=>b.classList.remove('active'));
  const tabMap={itinerary:0,hotel:1,budget:2,info:3};
  const tabs=document.querySelectorAll('.tab');
  if(tabEl)tabEl.classList.add('active');
  else if(tabs[tabMap[id]])tabs[tabMap[id]].classList.add('active');
  const nb=document.getElementById('nb'+(nbIdx!=null?nbIdx:tabMap[id]));
  if(nb)nb.classList.add('active');
  if(id==='itinerary')renderItinerary();
  else if(id==='hotel')renderHotel();
  else if(id==='budget')renderBudget();
  else renderInfo();
}

// Init default data and render immediately
for(let i=0;i<7;i++){data[i]=DEFAULT[i]?JSON.parse(JSON.stringify(DEFAULT[i])):[];}

function updateDateDisplay(){
  const first=DAYS[0].n;
  const last=DAYS[DAYS.length-1].n;
  document.getElementById('dateValDisplay').textContent=`2025.06.${first.padStart(2,'0')} — 06.${last.padStart(2,'0')}`;
}

const scroll=document.getElementById('dayScroll');
DAYS.forEach((d,i)=>{
  const el=document.createElement('div');
  el.className='day-pill'+(i===0?' active':'');
  el.innerHTML=`
    <input class="day-num-input" value="${d.n}" maxlength="2" readonly
      style="display:block;width:38px;font-family:var(--font-display);font-size:15px;font-weight:500;color:#fff;background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,0.4);outline:none;text-align:center;padding:0 0 1px;"
      onclick="event.stopPropagation();"
      onchange="DAYS[${i}].n=this.value.trim();updateDateDisplay();if(currentTab==='itinerary')renderItinerary();"
    />
    <input class="day-lbl-input" value="${d.d}" maxlength="3" readonly
      style="display:block;width:38px;font-size:10px;color:#fff;background:transparent;border:none;outline:none;text-align:center;margin-top:1px;opacity:0.85;padding:0;"
      onclick="event.stopPropagation();"
      onchange="DAYS[${i}].d=this.value.trim();"
    />`;
  el.onclick=()=>{
    document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');currentDay=i;window.currentDay=i;applyBg(currentDay);
    if(currentTab==='itinerary')renderItinerary();
  };
  scroll.appendChild(el);
});

applyNightMode();
renderItinerary();

// Expose shared state for Firebase module
window.data = data;
window.bgData = bgData;
window.currentTab = currentTab;
window.currentDay = currentDay;
window.renderItinerary = renderItinerary;
window.renderHotel = renderHotel;
window.renderInfo = renderInfo;
window.addHotel = addHotel;
window.deleteHotel = deleteHotel;
window.toggleNightMode = toggleNightMode;
window.applyNightMode = applyNightMode;
window.infoData = infoData;
window.applyBg = applyBg;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbConfig = {
  apiKey: "AIzaSyCIOLBhCJnzfxReb6jOm-xB18C6oODaLhw",
  authDomain: "apptest-120af.firebaseapp.com",
  databaseURL: "https://apptest-120af-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "apptest-120af",
  storageBucket: "apptest-120af.firebasestorage.app",
  messagingSenderId: "406268083750",
  appId: "1:406268083750:web:d4d07bd22b1882c0a2f0e7"
};

const fbApp = initializeApp(fbConfig);
const db = getDatabase(fbApp);

window._fbSave = function() {
  const itinerary={};
  for(let i=0;i<7;i++) itinerary['d'+i]=window.data[i]||[];
  set(ref(db,'yongbros/itinerary'),itinerary);
  set(ref(db,'yongbros/backgrounds'),window.bgData||{});
  set(ref(db,'yongbros/info'),window.infoData||{});
};

onValue(ref(db,'yongbros/itinerary'),(snapshot)=>{
  if(snapshot.exists()){
    const remote=snapshot.val();
    for(let i=0;i<7;i++){
      if(remote['d'+i]) window.data[i]=remote['d'+i];
    }
    if(window.currentTab==='itinerary') window.renderItinerary();
  } else {
    window._fbSave();
  }
});

onValue(ref(db,'yongbros/info'),(snapshot)=>{
  if(snapshot.exists()){
    const remote=snapshot.val();
    Object.assign(window.infoData,remote);
    window.applyNightMode();
    if(window.currentTab==='info') window.renderInfo&&window.renderInfo();
    else if(window.currentTab==='hotel') window.renderHotel();
  }
});

let _bgLoaded=false;
onValue(ref(db,'yongbros/backgrounds'),(snapshot)=>{
  if(_bgLoaded) return;
  _bgLoaded=true;
  if(snapshot.exists()){
    window.bgData=snapshot.val();
    window.applyBg(window.currentDay);
  }
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js");}</script>
